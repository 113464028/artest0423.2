<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EWAN AR 濾鏡</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family: -apple-system, sans-serif;
  }

  /* Full screen container */
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  /* Video + canvas stacked, 9:16 */
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
  }

  /* Video: hidden but active — drives MediaPipe */
  #video {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0.01;
    pointer-events: none;
    /* NOT display:none — Safari won't render hidden video */
  }

  /* Main display canvas */
  #arCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Frame overlay on top */
  #frameImg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    pointer-events: none;
    z-index: 5;
  }

  /* Debug overlay */
  #debug {
    position: absolute;
    top: 8px; left: 8px;
    z-index: 20;
    font-size: 11px;
    color: #0f0;
    background: rgba(0,0,0,0.6);
    padding: 4px 8px;
    border-radius: 4px;
    pointer-events: none;
    display: none; /* hide in production */
  }

  /* Bottom bar */
  #bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    background: rgba(0,0,0,0.75);
    padding: 12px 20px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #888; letter-spacing: 0.08em;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink:0; }
  .dot.live { background: #4fffb0; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #captureBtn {
    background: #e8c840;
    color: #000;
    border: none; border-radius: 8px;
    padding: 10px 24px;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    -webkit-appearance: none;
  }
  #captureBtn:active { opacity: 0.75; }

  /* Start screen */
  #startScreen {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    cursor: pointer;
  }

  .s-logo {
    font-size: 32px; font-weight: 900;
    color: #e8c840; letter-spacing: 0.3em;
    text-shadow: 0 0 30px #e8c84066;
  }
  .s-circle {
    width: 80px; height: 80px;
    border: 2.5px solid #e8c840;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #e8c840;
    box-shadow: 0 0 24px #e8c84044, inset 0 0 16px #e8c84011;
  }
  .s-label {
    font-size: 14px; letter-spacing: 0.2em; color: #888;
  }
  #s-hint {
    font-size: 13px; color: #e8c840; min-height: 20px; letter-spacing: 0.05em;
  }
  #s-tip {
    display: none;
    margin-top: 8px;
    background: rgba(232,200,64,0.1);
    border: 1px solid #e8c84055;
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 12px; color: #e8c840;
    text-align: center; line-height: 2;
    max-width: 280px;
  }

  .flash {
    position: fixed; inset: 0;
    background: #fff; opacity: 0;
    pointer-events: none; z-index: 999;
  }
  .flash.go { animation: flashAnim 0.4s forwards; }
  @keyframes flashAnim {
    0% { opacity: 0.9; }
    100% { opacity: 0; }
  }
</style>
</head>

const video    = document.getElementById('video');
const canvas   = document.getElementById('arCanvas');
const ctx      = canvas.getContext('2d');
const dbg      = document.getElementById('debug');
const hint     = document.getElementById('s-hint');
const tip      = document.getElementById('s-tip');
const startBtn = document.getElementById('startBtn');

const blushImg = new Image(); blushImg.src = BLUSH_SRC;
const okImg    = new Image(); okImg.src = OK_SRC;

let faceMesh = null;
let frameCount = 0;
let renderLoopId = null;
let streamReady = false;

// ── Resize canvas to fill stage ──
function resizeCanvas() {
  canvas.width  = canvas.offsetWidth  || window.innerWidth;
  canvas.height = canvas.offsetHeight || window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);

// ── STEP 1: User taps → request camera ──
document.getElementById('startBtn').addEventListener('click', async () => {
  startBtn.style.opacity = '0.5';
  startBtn.style.pointerEvents = 'none';
  hint.textContent = '正在請求鏡頭權限…';

  try {
    const constraints = {
      video: {
        facingMode: 'user',
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;

    // Safari needs explicit play() call after srcObject set
    await video.play();

    hint.textContent = '✓ 鏡頭已開啟，載入 AR 中…';

    // Wait for video to have actual dimensions
    await waitForVideoDimensions();

    // Resize canvas now that we know video size
    resizeCanvas();

    // Start render loop so user sees camera immediately
    streamReady = true;
    startRenderLoop();

    // Then init MediaPipe in background
    await initFaceMesh();

  } catch(e) {
    console.error(e);
    startBtn.style.opacity = '1';
    startBtn.style.pointerEvents = 'auto';

    if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
      hint.textContent = '❌ 鏡頭權限被拒絕';
      tip.style.display = 'block';
      tip.innerHTML = '⚙️ Safari 設定方法：<br>設定 → Safari → 鏡頭<br>選擇「允許」後重新整理';
    } else if (e.name === 'NotFoundError') {
      hint.textContent = '❌ 找不到鏡頭裝置';
    } else if (e.name === 'NotReadableError') {
      hint.textContent = '❌ 鏡頭被其他 App 佔用<br>請關閉相機後再試';
    } else {
      hint.textContent = '❌ ' + (e.message || e.name);
    }
  }
});

// Wait until video has real dimensions
function waitForVideoDimensions() {
  return new Promise((resolve) => {
    const check = () => {
      if (video.videoWidth > 0 && video.videoHeight > 0) {
        resolve();
      } else {
        requestAnimationFrame(check);
      }
    };
    check();
  });
}

// ── Render loop: draw video to canvas every frame ──
function startRenderLoop() {
  if (renderLoopId) return;
  function loop() {
    if (streamReady && video.readyState >= 2) {
      drawFrame();
    }
    renderLoopId = requestAnimationFrame(loop);
  }
  renderLoopId = requestAnimationFrame(loop);
}

// Draw video + AR overlays
function drawFrame() {
  const W = canvas.width, H = canvas.height;

  ctx.save();
  // Mirror horizontally (front camera selfie mode)
  ctx.translate(W, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, W, H);
  ctx.restore();

  // Draw AR overlays if we have face data
  if (lastLandmarks) {
    drawBlush(lastLandmarks);
    if (isMouthOpen && isSmiling) {
      drawOK(lastLandmarks);
    }
  }
}

// ── STEP 2: Init MediaPipe ──
async function initFaceMesh() {
  try {
    faceMesh = new FaceMesh({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onFaceResults);

    // Kick MediaPipe with current video frame
    processFaceLoop();

    // Hide start screen
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('dot').classList.add('live');
    document.getElementById('statusTxt').textContent = '偵測中';

  } catch(e) {
    console.error('MediaPipe init error:', e);
    // Even if MediaPipe fails, camera still shows
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('statusTxt').textContent = '鏡頭模式';
  }
}

// Send frames to MediaPipe independently from render loop
let faceBusy = false;
async function processFaceLoop() {
  if (!faceMesh || !streamReady) return;
  if (!faceBusy && video.readyState >= 2) {
    faceBusy = true;
    try {
      await faceMesh.send({ image: video });
    } catch(e) {}
    faceBusy = false;
  }
  setTimeout(processFaceLoop, 33); // ~30fps for face detection
}

// ── Face detection results ──
let lastLandmarks = null;
let isMouthOpen = false;
let isSmiling = false;

function onFaceResults(results) {
  frameCount++;

  if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
    lastLandmarks = null;
    dbg.textContent = '未偵測到人臉';
    return;
  }

  const lm = results.multiFaceLandmarks[0];
  lastLandmarks = lm;

  // Mouth open ratio
  const lipTop = lpx(lm, 13), lipBot = lpx(lm, 14);
  const mL = lpx(lm, 78),     mR     = lpx(lm, 308);
  const mH = dist(lipTop, lipBot);
  const mW = dist(mL, mR);
  const mouthRatio = mH / (mW + 0.001);

  // Smile ratio
  const lCorner = lpx(lm, 61), rCorner = lpx(lm, 291);
  const noseTip = lpx(lm, 1),  chin    = lpx(lm, 152);
  const fH   = dist(noseTip, chin);
  const midY = (noseTip.y + chin.y) / 2;
  const cAvgY = (lCorner.y + rCorner.y) / 2;
  const smile = (midY - cAvgY) / (fH + 0.001);

  isMouthOpen = mouthRatio > 0.28;
  isSmiling   = smile > 0.04;

  dbg.textContent = `張嘴:${mouthRatio.toFixed(2)} 微笑:${smile.toFixed(3)}`;
}

// ── Helpers ──
function lpx(lm, idx) {
  return { x: lm[idx].x * canvas.width, y: lm[idx].y * canvas.height };
}
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// ── Blush ──
function drawBlush(lm) {
  const lC = lpx(lm, 205), rC = lpx(lm, 425);
  const fL = lpx(lm, 234), fR = lpx(lm, 454);
  const fw = dist(fL, fR);
  const bW = fw * 0.35, bH = bW * 0.55;

  ctx.save();
  ctx.globalAlpha = 0.70;

  // Left
  ctx.drawImage(blushImg, lC.x - bW/2, lC.y - bH/2, bW, bH);

  // Right (mirror blush)
  ctx.translate(rC.x, rC.y);
  ctx.scale(-1, 1);
  ctx.drawImage(blushImg, -bW/2, -bH/2, bW, bH);

  ctx.restore();
}

// ── OK sticker ──
function drawOK(lm) {
  const nb = lpx(lm, 6);
  const fL = lpx(lm, 234), fR = lpx(lm, 454);
  const fw = dist(fL, fR);
  const oW = fw * 0.50;
  const oH = okImg.naturalHeight ? oW * (okImg.naturalHeight / okImg.naturalWidth) : oW * 0.5;

  ctx.save();
  ctx.globalAlpha = 1.0;
  ctx.drawImage(okImg, nb.x - oW/2, nb.y - oH/2, oW, oH);
  ctx.restore();
}

// ── Capture ──
function capture() {
  // Create output canvas
  const out = document.createElement('canvas');
  out.width  = canvas.width;
  out.height = canvas.height;
  const oc = out.getContext('2d');

  // Draw AR canvas (already mirrored)
  oc.drawImage(canvas, 0, 0);

  // Draw frame overlay
  const frameEl = document.getElementById('frameImg');
  oc.drawImage(frameEl, 0, 0, out.width, out.height);

  // Download
  const link = document.createElement('a');
  link.download = `EWAN-AR-${Date.now()}.png`;
  link.href = out.toDataURL('image/png');
  link.click();

  // Flash
  const fl = document.getElementById('flash');
  fl.classList.add('go');
  setTimeout(() => fl.classList.remove('go'), 500);
}

// Init canvas size on load
resizeCanvas();
</script>
